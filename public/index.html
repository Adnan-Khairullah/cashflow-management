<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Contractor Cash Flow Management — Login to manage bills, approvals, and cash flow.">
  <title>Cash Flow Management — Login</title>
  <link rel="stylesheet" href="/css/style.css">
</head>

<body>
  <div class="login-page">
    <div class="login-left">
      <div class="login-card">
        <div class="login-logo">
          <div class="login-logo-icon">₹</div>
          <div class="login-logo-text">CashFlow</div>
        </div>
        <h1>Welcome back</h1>
        <p class="login-subtitle">Sign in to manage your bills and cash flow</p>

        <div class="form-error" id="loginError">
          <span>⚠</span>
          <span id="loginErrorText">Invalid username or password</span>
        </div>

        <form id="loginForm" autocomplete="off" onsubmit="event.preventDefault();">
          <div class="form-group">
            <label class="form-label" for="username">Username</label>
            <input type="text" class="form-input" id="username" name="username" placeholder="Enter your username"
              required autofocus>
          </div>

          <div class="form-group">
            <label class="form-label" for="password">Password</label>
            <input type="password" class="form-input" id="password" name="password" placeholder="Enter your password"
              required>
          </div>

          <button type="submit" class="btn btn-primary btn-block" id="loginBtn">
            Sign In
          </button>
        </form>

        <div class="login-credentials">
          <div class="login-credentials-title">Contact your admin for login credentials</div>
        </div>
      </div>
    </div>
  </div>

  <script src="/js/api.js"></script>
  <script src="/js/login.js"></script>
</body>

</html>
